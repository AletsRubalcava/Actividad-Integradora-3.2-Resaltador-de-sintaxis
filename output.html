<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Resaltador de Sintaxis</title>
    <link rel="stylesheet" href="resalta_sintaxis.css">
</head>
<body>
<pre class="code"><span class="symbol">atomo</span> <span class="number">25</span> <span class="boolean">#t</span> <span class="string">"hola amigo"</span>

<span class="parenthesis">(</span><span class="parenthesis">(</span><span class="number">1</span> <span class="number">2</span><span class="parenthesis">)</span><span class="parenthesis">(</span><span class="boolean">#f</span> <span class="boolean">#t</span><span class="parenthesis">)</span><span class="parenthesis">)</span> <span class="symbol">es</span> <span class="symbol">una</span> <span class="string">"lista anidada"</span>

<span class="parenthesis">(</span><span class="symbol">define</span> <span class="parenthesis">(</span><span class="symbol">prueba</span> <span class="symbol">x</span><span class="parenthesis">)</span>
<span class="parenthesis">(</span><span class="symbol">if</span> <span class="parenthesis">(</span><span class="symbol">equal</span> <span class="symbol">x</span> <span class="number">10</span><span class="parenthesis">)</span>
	<span class="parenthesis">(</span><span class="symbol">display</span> <span class="parenthesis">(</span><span class="symbol">x</span> <span class="symbol">igual</span> <span class="symbol">a</span> <span class="number">10</span><span class="parenthesis">)</span><span class="parenthesis">)</span>
	<span class="parenthesis">(</span><span class="symbol">display</span> <span class="string">"x es diferente a 10"</span><span class="parenthesis">)</span><span class="parenthesis">)</span><span class="parenthesis">)</span> <span class="end">$</span>
</pre>
</body>
</html>
